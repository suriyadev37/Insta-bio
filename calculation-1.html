<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome 💖</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-calc">
    <div class="container">
        <h1>Welcome 💖</h1>
        <p>Solve this 3-digit teaser to enter...</p>

        <p class="lazy-text" id="lazyText">
            Don't feel lazy, just do it!<br>
            Suppose you don't have the patience... then click the "Show Answer" button 15 times to get the answer.
        </p>

        <button class="btn-cheat" id="cheatBtn" onclick="handleCheatClick(event)">Show Answer</button>

        <div class="math-box" id="equation">Generating...</div>
        <input type="number" id="answer" placeholder="Sum of numbers..." inputmode="numeric">

        <button onclick="checkAnswer()">Unlock Next Page ✨</button>
        <div class="error" id="errorMsg"></div>
    </div>

    <div class="modal-overlay" id="trollModal">
        <div class="modal-box">
            <p id="modalMsg"></p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
