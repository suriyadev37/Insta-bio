<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter and Continue 💖</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-index">
    <div class="container">
        <h1>Welcome 💖</h1>
        <img src="img/sk.png" width="130px" alt="Image">
        <br><br>
        <p style="color:#ff3f6c;margin-bottom:10px;font-weight:bold;font-size:18px;">Enter Your Name</p>

        <input type="text" id="userInput" placeholder="Enter here..." autocomplete="off" oninput="clearError()">
        <div class="error" id="errorMsg"></div>

        <button onclick="continueToNext()">Continue ✨</button>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
